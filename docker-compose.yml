version: '3.8'

services:
  rabbitmq:
    build:
      context: ./rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  publisher:
    build:
      context: ./publisher
      dockerfile: Dockerfile
    container_name: publisher
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_QUEUE: messages
      RABBITMQ_EXCHANGE: messages_exchange
    volumes:
      - ./logs:/logs
    depends_on:
      rabbitmq:
        condition: service_healthy

  php-consumer:
    build:
      context: ./consumers/php
      dockerfile: Dockerfile
    container_name: php-consumer
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_QUEUE: messages
    volumes:
      - ./logs:/logs
    depends_on:
      rabbitmq:
        condition: service_healthy

  ts-consumer:
    build:
      context: ./consumers/typescript
      dockerfile: Dockerfile
    container_name: ts-consumer
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_QUEUE: messages
    volumes:
      - ./logs:/logs
    depends_on:
      rabbitmq:
        condition: service_healthy

  python-consumer:
    build:
      context: ./consumers/python
      dockerfile: Dockerfile
    container_name: python-consumer
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_QUEUE: messages
    volumes:
      - ./logs:/logs
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:
